name: Run Zippy

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      output_path:
        description: '출력 폴더 경로'
        required: true
        default: './sampleLogs'
        type: string
      date:
        description: '날짜 (YYYY-MM-DD)'
        required: true
        default: '2025-05-02'
        type: string
      time:
        description: '시간 (HH-MM-SS)'
        required: true
        default: '11-15-00'
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Code checkout
        uses: actions/checkout@v4

      - name: Python setting
        uses: actions/setup-python@v5
        with:
          python-version: '3.9.13'

      - name: Run script
        run: |
          python main_ci.py \
            --output_path ${{ github.event.inputs.output_path }} \
            --date ${{ github.event.inputs.date }} \
            --time ${{ github.event.inputs.time }}